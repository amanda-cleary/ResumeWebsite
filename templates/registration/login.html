{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://kit.fontawesome.com/63b42a2c0b.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
</head>

{% block content %}
<form method="post" class="auth-card">
    {% csrf_token %}

    <label class="auth-label">
        Username
        <input type="text" name="username" autofocus required class="auth-input">
    </label>

    <label class="auth-label">
        Password
        <input type="password" name="password" required class="auth-input">
    </label>

    <div class="auth-actions">
        <button type="submit" class="cute-button">Log In</button>
    </div>
</form>
{% endblock %}
