{% extends "recipe_base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
<form method="post" class="auth-card">
    {% csrf_token %}

    <label class="auth-label">
        Username
        <input type="text" name="username" autofocus required class="auth-input">
    </label>

    <label class="auth-label">
        Password
        <input type="password" name="password" required class="auth-input">
    </label>

    <div class="auth-actions">
        <button type="submit" class="recipe-button">Log In</button>
    </div>
</form>
{% endblock %}
