{% extends "recipe_base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
<form method="post" class="auth-card">
    {% csrf_token %}

    <label>
        Username
        <input type="text" name="username" autofocus required aria-label="Input username">
    </label>

    <label>
        Password
        <input type="password" name="password" required aria-label="Input password">
    </label>

    <nav>
        <a href="{% url 'recipes' %}" class="recipe-button">← Back to Recipes</a>
        <button type="submit" class="recipe-button primary">Log In</button>
    </nav>
</form>
{% endblock %}
