<head>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://kit.fontawesome.com/63b42a2c0b.js" crossorigin="anonymous"></script>
</head>

<body class="recipe-page-wrapper">
    <header class="recipe-header">
        <h1>Recipe Book</h1>

        {% if user.is_authenticated %}
        <form method="post" action="{% url 'logout' %}" class="header-auth">
            {% csrf_token %}
            <button type="submit" class="cute-header-button">Log out</button>
        </form>
        {% else %}
        <a class="cute-header-button" href="{% url 'login' %}">I'm Amanda</a>
        {% endif %}
    </header>
    <div class="scroll-area">
    {% block content %}{% endblock %}
    </div>
    {% block dialogs %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
