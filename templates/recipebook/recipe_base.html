<head>
    <title>{% block title %}{% endblock %}Amanda's Recipe Book</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/63b42a2c0b.js" crossorigin="anonymous"></script>
</head>

<body class="recipe-page-wrapper">
    <!-- Standard Recipe Header -->
    <header>
        <h1>Amanda's Recipe Book</h1>
        <!-- Admin Authentication -->
        <nav>
            {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button type="submit" class="auth-button">Log out</button>
            </form>
            {% else %}
            <a class="auth-button" href="{% url 'login' %}">I'm Amanda</a>
            {% endif %}
        </nav>
    </header>
    <!-- Scrollable Content -->
    <main class="scroll-area">
        {% block content %}{% endblock %}
    </main>
</body>

{% block dialogs %}{% endblock %}
{% block scripts %}{% endblock %}
