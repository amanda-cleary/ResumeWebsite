{% extends "recipebook/recipe_base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}
<form method="post" class="auth-card">
    {% csrf_token %}

    <label for="username" class="recipe-label">
        Username
        <input type="text" name="username" id="username" autofocus required aria-label="Input username">
    </label>

    <label for="password" class="recipe-label">
        Password
        <input type="password" name="password" id="password" required aria-label="Input password">
    </label>

    <nav class="recipe-nav">
        <a href="{% url 'recipes' %}" class="recipe-button">← Back to Recipes</a>
        <button type="submit" class="recipe-button primary">Log In</button>
    </nav>
</form>
{% endblock %}
